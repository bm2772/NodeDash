name: Publish backend image to GHCR

# Builds the backend container from the repo Dockerfile and pushes it to the
# GitHub Container Registry using the built-in GITHUB_TOKEN — no PAT needed.
# Image: ghcr.io/<owner>/nodedash:latest

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "questionnaire/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase the image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/nodedash" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}

      - name: Summary
        run: |
          echo "### Image pushed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo '`'"${{ steps.img.outputs.name }}:latest"'`' >> "$GITHUB_STEP_SUMMARY"
